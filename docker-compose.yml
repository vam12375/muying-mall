version: '3.8'

# 网络定义
networks:
  muying-network:
    driver: bridge

# 数据卷定义
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

services:
  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: muying-mysql
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.60
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-muying123456}
      MYSQL_DATABASE: muying_mall
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./muying_mall.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=300
      - --innodb_buffer_pool_size=256M
    networks:
      - muying-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-muying123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis 7.4 缓存
  redis:
    image: redis:7.4-alpine
    container_name: muying-redis
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.20
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy volatile-lru
      --notify-keyspace-events Ex
    networks:
      - muying-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ 4.1 消息队列
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: muying-rabbitmq
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.30
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      TZ: Asia/Shanghai
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - muying-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: muying-mall:latest
    container_name: muying-backend
    restart: unless-stopped
    mem_limit: 704m
    cpus: 0.90
    environment:
      # Spring配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/muying_mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-muying123456}
      
      # Redis配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # RabbitMQ配置
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      
      # 轻量化部署：不启用ES预热，搜索相关能力按应用内降级逻辑处理
      ELASTICSEARCH_WARMUP_ENABLED: "false"
      
      # JWT配置（请修改为您的密钥）
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production}
      
      # 支付宝配置（请填入您的配置）
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_REFUND_NOTIFY_URL: ${ALIPAY_REFUND_NOTIFY_URL:-}
      
      # CORS配置 - 填入 Cloudflare Tunnel 分配的 HTTPS 地址
      # 多个地址用逗号分隔，例如: https://muying-web.pages.dev,https://xxx.trycloudflare.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://muying-web.pages.dev}
      
      # 文件上传配置 - UPLOAD_DOMAIN 填入 Cloudflare Tunnel 后端地址
      UPLOAD_DOMAIN: ${UPLOAD_DOMAIN:-http://192.144.136.62:8080}
      UPLOAD_PATH: /app/uploads
      
      # 时区
      TZ: Asia/Shanghai
      
      # 2C2G机器建议保守配置，避免与MySQL/RabbitMQ争抢内存
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - muying-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
