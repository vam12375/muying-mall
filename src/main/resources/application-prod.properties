# 生产环境配置

# CORS配置 - 生产环境
# 支持通过环境变量 CORS_ALLOWED_ORIGINS 在运行时追加自定义域名（如 Cloudflare Tunnel 地址）
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://muying-web.pages.dev}
cors.allowed-methods=*
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# 文件上传配置 - 生产环境（Linux服务器 Docker 部署）
# UPLOAD_PATH: Docker容器内挂载路径，对应宿主机 ./uploads 目录
upload.path=${UPLOAD_PATH:/app/uploads}
upload.avatar.path=/avatars
# UPLOAD_DOMAIN: 文件访问域名，使用 Cloudflare Tunnel 地址或 http://服务器IP:8080
upload.domain=${UPLOAD_DOMAIN:http://192.144.136.62:8080}

# 文件访问URL（保持兼容性）
file.upload.path=${UPLOAD_PATH:/app/uploads}
file.access.url=${UPLOAD_DOMAIN:http://192.144.136.62:8080}/avatars

# 文件上传大小限制配置
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
